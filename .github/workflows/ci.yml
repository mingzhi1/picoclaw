name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CGO_ENABLED: "0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate
        run: go generate ./...

      - name: Vet
        run: go vet ./...

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate
        run: go generate ./...

      - name: Test
        run: go test -race -count=1 ./...

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - {goos: linux,   goarch: amd64}
          - {goos: linux,   goarch: arm64}
          - {goos: linux,   goarch: riscv64}
          - {goos: darwin,  goarch: arm64}
          - {goos: windows, goarch: amd64}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate
        run: go generate ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short=8 HEAD 2>/dev/null || echo "dev")
          GOVERSION=$(go env GOVERSION)
          PKG="github.com/mingzhi1/metaclaw/cmd/metaclaw/internal"

          go build -v -tags stdjson \
            -ldflags "-X ${PKG}.version=${VERSION} -X ${PKG}.gitCommit=${COMMIT} -X ${PKG}.goVersion=${GOVERSION} -s -w" \
            -o build/metaclaw-${GOOS}-${GOARCH}${EXT} \
            ./cmd/metaclaw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: metaclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: build/metaclaw-*
          retention-days: 7
