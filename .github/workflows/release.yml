name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.3.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false
      draft:
        description: "Create as draft"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  CGO_ENABLED: "0"

jobs:
  tag:
    name: Create Tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {goos: linux,   goarch: amd64}
          - {goos: linux,   goarch: arm64}
          - {goos: linux,   goarch: riscv64}
          - {goos: linux,   goarch: loong64}
          - {goos: darwin,  goarch: arm64}
          - {goos: windows, goarch: amd64}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate
        run: go generate ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi

          VERSION="${{ inputs.tag }}"
          COMMIT=$(git rev-parse --short=8 HEAD)
          GOVERSION=$(go env GOVERSION)
          PKG="github.com/sipeed/picoclaw/cmd/picoclaw/internal"

          go build -tags stdjson \
            -ldflags "-X ${PKG}.version=${VERSION} -X ${PKG}.gitCommit=${COMMIT} -X ${PKG}.goVersion=${GOVERSION} -s -w" \
            -o metaclaw-${GOOS}-${GOARCH}${EXT} \
            ./cmd/picoclaw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: metaclaw-${{ matrix.goos }}-${{ matrix.goarch }}
          path: metaclaw-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Package archives
        working-directory: dist
        run: |
          for f in metaclaw-*; do
            if [[ "$f" == *.exe ]]; then
              name="${f%.exe}"
              zip "${name}.zip" "$f"
              rm "$f"
            else
              chmod +x "$f"
              tar czf "${f}.tar.gz" "$f"
              rm "$f"
            fi
          done
          ls -la

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git tag --sort=-version:refname | grep -v "${{ inputs.tag }}" | head -1)
          if [ -n "$PREV" ]; then
            echo "## Changes since ${PREV}" > CHANGELOG.md
            git log "${PREV}..HEAD" --oneline --no-merges >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""
          if [ "${{ inputs.draft }}" = "true" ]; then FLAGS="$FLAGS --draft"; fi
          if [ "${{ inputs.prerelease }}" = "true" ]; then FLAGS="$FLAGS --prerelease"; fi

          gh release create "${{ inputs.tag }}" \
            --title "MetaClaw ${{ inputs.tag }}" \
            --notes-file CHANGELOG.md \
            $FLAGS \
            dist/*
