# MetaClaw Docker Compose
#
# Minimal (Alpine-only):
#   docker compose -f docker/docker-compose.yml --profile gateway up
#
# Full (with MCP / Node.js / Python):
#   METACLAW_IMAGE=full docker compose -f docker/docker-compose.yml --profile gateway up
#
# First run generates config → edit docker/data/config.json → restart.

x-common: &common
  build:
    context: ..
    dockerfile: docker/Dockerfile
    target: ${METACLAW_IMAGE:-minimal}
  volumes:
    - ./data:/root/.metaclaw
  environment:
    - METACLAW_HOME=/root/.metaclaw

services:
  # ── Agent (one-shot) ────────────────────────────
  #   docker compose -f docker/docker-compose.yml run --rm metaclaw-agent -m "Hello"
  metaclaw-agent:
    <<: *common
    container_name: metaclaw-agent
    profiles: [agent]
    entrypoint: ["metaclaw", "agent"]
    stdin_open: true
    tty: true

  # ── Gateway (long-running bot) ──────────────────
  #   docker compose -f docker/docker-compose.yml --profile gateway up -d
  metaclaw-gateway:
    <<: *common
    container_name: metaclaw-gateway
    restart: unless-stopped
    profiles: [gateway]
    ports:
      - "18790:18790"
